<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 244" width="530" height="244" role="img" aria-labelledby="t d">
  <title id="t">plx</title>
  <desc id="d">Multiple language dialects converging into a single plpgsql core.</desc>

  <!-- dialect strands: Ruby, PHP, JavaScript, Python — merging into the core -->
  <g fill="none" stroke-width="13" stroke-linecap="round">
    <path d="M26,64  C74,64  74,120 112,120" stroke="#CC342D"/><!-- Ruby -->
    <path d="M26,101 C74,101 82,120 112,120" stroke="#777BB3"/><!-- PHP -->
    <path d="M26,139 C74,139 82,120 112,120" stroke="#F0DB4F"/><!-- JavaScript -->
    <path d="M26,176 C74,176 74,120 112,120" stroke="#3776AB"/><!-- Python -->
  </g>

  <!-- the plpgsql core the dialects transpile into -->
  <rect x="112" y="72" width="96" height="96" rx="22" fill="#336791"/>
  <g fill="#ffffff">
    <rect x="132" y="100" width="60" height="10" rx="5"/>
    <rect x="132" y="120" width="48" height="10" rx="5"/>
    <rect x="132" y="140" width="36" height="10" rx="5"/>
  </g>

  <!-- wordmark: plx -->
  <g fill="#336791">
    <rect x="250" y="64" width="26" height="150" rx="13"/>
    <path fill-rule="evenodd" d="M320,65 a52,52 0 1 0 0.1,0 Z M320,91 a26,26 0 1 1 -0.1,0 Z"/>
    <rect x="372" y="44" width="26" height="126" rx="13"/>
  </g>
  <g stroke="#336791" stroke-width="26" stroke-linecap="round">
    <line x1="420" y1="66" x2="494" y2="168"/>
    <line x1="494" y1="66" x2="420" y2="168"/>
  </g>
</svg>
